name: Deploy Frontend to Azure

on:
  workflow_dispatch: # ← Run manually from GitHub Actions tab when ready
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-frontend.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    # Skip if Azure credentials are not configured yet
    if: ${{ secrets.AZURE_CREDENTIALS != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build Next.js app
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FACTORY_ADDRESS: ${{ secrets.NEXT_PUBLIC_FACTORY_ADDRESS }}
          NEXT_PUBLIC_DIRECT_FACTORY_ADDRESS: ${{ secrets.NEXT_PUBLIC_DIRECT_FACTORY_ADDRESS }}
          NEXT_PUBLIC_BONDING_CURVE_ADDRESS: ${{ secrets.NEXT_PUBLIC_BONDING_CURVE_ADDRESS }}
          NEXT_PUBLIC_LIQUIDITY_MANAGER_ADDRESS: ${{ secrets.NEXT_PUBLIC_LIQUIDITY_MANAGER_ADDRESS }}
          NEXT_PUBLIC_FEE_WALLET: ${{ secrets.NEXT_PUBLIC_FEE_WALLET }}
          NEXT_PUBLIC_BSC_RPC: https://bsc-dataseed.binance.org
          NEXT_PUBLIC_COINMARKETCAP_API_KEY: ${{ secrets.NEXT_PUBLIC_COINMARKETCAP_API_KEY }}
          NEXT_PUBLIC_COINGECKO_API_KEY: ${{ secrets.NEXT_PUBLIC_COINGECKO_API_KEY }}

      # Step 1 — Login to Azure using Service Principal credentials
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 2 — Deploy Next.js standalone build to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          package: ./frontend/.next/standalone

      - name: Azure Logout
        run: az logout
        if: always()
